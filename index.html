<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#11141d" />
    <meta
      name="description"
      content="Tax & Structures Lab — interactive learning for founders on tax efficiency and business structures. Educational, not advisory."
    />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <title>Tax & Structures Lab</title>
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('tsl:dark');
          var prefers = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var dark = saved === null ? prefers : saved === '1';
          if (dark) document.documentElement.classList.add('dark');
        } catch (_) {}
      })();
    </script>
  </head>
  <body class="bg-ink-50 dark:bg-ink-950 text-ink-900 dark:text-ink-100">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
